name: Deploy to cPanel Development

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Replace config tokens
        run: |
          sed -i 's/{{DB_HOST}}/${{ secrets.HOSTINGER_DB_HOST }}/g' includes/config.php
          sed -i 's/{{DB_NAME}}/${{ secrets.HOSTINGER_DB_NAME }}/g' includes/config.php
          sed -i 's/{{DB_USER}}/${{ secrets.HOSTINGER_DB_USERNAME }}/g' includes/config.php
          sed -i 's/{{DB_PASS}}/${{ secrets.HOSTINGER_DB_PASS }}/g' includes/config.php
          sed -i 's/{{DB_PORT}}/${{ secrets.HOSTINGER_DB_PORT }}/g' includes/config.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: /qa/
